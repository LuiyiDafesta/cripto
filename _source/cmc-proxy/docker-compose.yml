version: "3.8"

services:
  cmc-proxy:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      - CMC_API_KEY=c27cc7694da14fa5a95c206e17228795
      - ALLOWED_ORIGINS=*
      - PORT=3099
    networks:
      - dokploy-network
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > package.json << 'PKGEOF'
        {"dependencies":{"cors":"^2.8.5","express":"^4.21.0"}}
        PKGEOF
        cat > server.js << 'SRVEOF'
        const express=require("express"),cors=require("cors"),app=express();
        const PORT=process.env.PORT||3099;
        const KEY=process.env.CMC_API_KEY||"";
        const BASE="https://pro-api.coinmarketcap.com";
        const ORIGINS=(process.env.ALLOWED_ORIGINS||"*").split(",").map(s=>s.trim());
        app.use(cors({origin:(o,cb)=>{if(!o||ORIGINS.includes("*")||ORIGINS.includes(o))cb(null,true);else cb(new Error("blocked"))}}));
        app.get("/health",(_,r)=>r.json({ok:true}));
        app.get("/",(_, r)=>r.json({status:"CMC Proxy running",endpoints:["/health","/v1/cryptocurrency/listings/latest"]}));
        app.get(["/v1/*","/v2/*"],async(req,res)=>{try{const u=BASE+req.path+"?"+new URLSearchParams(req.query);const r=await fetch(u,{headers:{"X-CMC_PRO_API_KEY":KEY,Accept:"application/json"}});const d=await r.json();res.set("Cache-Control","public, max-age=120");res.status(r.status).json(d)}catch(e){res.status(500).json({error:String(e)})}});
        app.listen(PORT,"0.0.0.0",()=>console.log("CMC Proxy on :"+PORT));
        SRVEOF
        npm install --production --silent && node server.js

networks:
  dokploy-network:
    external: true
